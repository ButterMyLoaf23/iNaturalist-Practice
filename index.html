<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iNaturalist Practice</title>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>
<body>
    <h1>iNaturalist Practice</h1>

    <form id="searchForm">
        <label for="placeName">Search for a place:</label>
        <input
            type="text"
            id="placeName"
            placeholder="Try a national park"
        >

        <label for="dateFilter">Date Observed:</label>
        <input 
            type="date"
            id="dateFilter"
        >

        <button type="submit">Search</button>
    </form>

    <section>
        <h2>Species Found</h2>
        <div id="results"></div>
    </section>

    <select id="places"></select>
</body>
</html>
